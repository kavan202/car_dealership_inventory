services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: autovault-backend
    env: python
    region: singapore
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && alembic upgrade head && python app/seed.py"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autovault-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.2

  # 2. React Vite Frontend Static Site
  - type: web
    name: autovault-frontend
    env: static
    region: singapore
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: autovault-backend
          property: url
          suffix: /api

databases:
  # 3. PostgreSQL Database
  - name: autovault-db
    databaseName: car_inventory
    user: postgres
    region: singapore
    plan: free
